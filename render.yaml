# Render Blueprint — featherflags
# Provisions: Go API (Docker) + managed Postgres + Key Value (Redis) + static dashboard.
# After the first deploy, set the dashboard's VITE_API_URL to the API's public URL.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: featherflags-db
    databaseName: featherflags
    user: featherflags
    plan: free # NOTE: free Postgres expires ~30 days; use a paid plan to persist

services:
  # --- Redis / Key Value (rule-set cache) ---
  - type: keyvalue
    name: featherflags-redis
    plan: free # no persistence on free — fine: it's a cache, API falls back to Postgres
    ipAllowList: [] # internal-only
    maxmemoryPolicy: allkeys-lru

  # --- API ---
  - type: web
    name: featherflags-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: featherflags-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: featherflags-redis
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true # Render generates a strong token; read it in the dashboard Environment tab

  # --- Dashboard (static) ---
  - type: web
    name: featherflags-dashboard
    runtime: static
    rootDir: apps/dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # set to the API URL after first deploy, e.g. https://featherflags-api.onrender.com
