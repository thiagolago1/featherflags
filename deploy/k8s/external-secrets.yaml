# Pulls secrets from the company's secret manager via External Secrets
# Operator (https://external-secrets.io). `secretStoreRef` assumes a
# ClusterSecretStore named "company-vault" already exists — point it at
# whatever backend is in use (Vault, AWS/GCP/Azure secrets manager, etc.).
# Adjust `remoteRef.key` paths to match the company's secret layout.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: featherflags-api-secrets
  namespace: featherflags
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: company-vault
    kind: ClusterSecretStore
  target:
    name: featherflags-api-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: featherflags/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: featherflags/redis-url
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: featherflags/admin-token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: featherflags-dashboard-secrets
  namespace: featherflags
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: company-vault
    kind: ClusterSecretStore
  target:
    name: featherflags-dashboard-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: featherflags/dashboard-database-url
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: featherflags/nextauth-secret
    - secretKey: INTERNAL_API_TOKEN
      remoteRef:
        key: featherflags/admin-token # same value as the API's ADMIN_TOKEN
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: featherflags/oidc-client-id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: featherflags/oidc-client-secret
