services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: featherflags
      POSTGRES_PASSWORD: featherflags
      POSTGRES_DB: featherflags
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U featherflags"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://featherflags:featherflags@db:5432/featherflags?sslmode=disable
      REDIS_URL: redis://redis:6379
      ADMIN_TOKEN: change-me-admin-token
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db-data:
