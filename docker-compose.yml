services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: featherflags
      POSTGRES_PASSWORD: featherflags
      POSTGRES_DB: featherflags
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U featherflags"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://featherflags:featherflags@db:5432/featherflags?sslmode=disable
      REDIS_URL: redis://redis:6379
      # Dev-only value (>=32 chars, not the shipped default) — the server
      # refuses to boot otherwise. Generate a real secret per environment.
      ADMIN_TOKEN: dev-only-admin-token-please-rotate-me
      ALLOWED_ORIGIN: http://localhost:3000
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: ./apps/dashboard
    environment:
      DATABASE_URL: postgres://featherflags:featherflags@db:5432/featherflags?sslmode=disable&schema=auth
      NEXTAUTH_SECRET: dev-only-nextauth-secret-please-rotate-me
      NEXTAUTH_URL: http://localhost:3000
      INTERNAL_API_URL: http://api:8080
      INTERNAL_API_TOKEN: dev-only-admin-token-please-rotate-me
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  db-data:
